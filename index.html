<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Expediente JL Torres - Radio Antigua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="radio-vintage">
        <!-- CUADRO DE NÚMERO AMPLIO -->
        <div class="display-frecuencia">
            <div class="visor">
                <span id="mhz">88.0</span>
            </div>
            <div class="unidad">MHz</div>
        </div>

        <div class="dial-analogico">
            <img src="https://i.postimg.cc/yxZP1pcN/istockphoto-638856258-612x612.jpg" class="fondo-radio">
            <div id="aguja-roja"></div>
        </div>

        <div class="interfaz-inferior">
            <div id="btn-power" class="switch-madera">
                <div class="palanca"></div>
                <span>POWER</span>
            </div>

            <!-- EL KNOB (Perilla giratoria) -->
            <div class="knob-container">
                <div class="knob-label">SINTONÍA</div>
                <input type="range" min="0" max="100" value="0" id="perilla">
            </div>
        </div>
    </div>

    <audio id="snd-estatica" loop src="estatica.mp3"></audio>
    <audio id="snd-cambio" src="sintonía.mp3"></audio>
    <audio id="snd-final" src="audio-final.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
