<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Interactiva - Proyecto Cine</title>
    <!-- Esto le dice a la página que use tu diseño -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="interfaz">
        <!-- BOTÓN OXIDADO -->
        <div id="btn-power" class="switch-antiguo">
            <div class="placa-metal">
                <div class="tornillo tr"></div>
                <div class="tornillo tl"></div>
                <div class="palanca"></div>
            </div>
            <span class="label">OFF</span>
        </div>

        <div class="radio-contenedor">
            <img src="https://i.postimg.cc/yxZP1pcN/istockphoto-638856258-612x612.jpg" class="fondo-radio">
            <div id="aguja-roja"></div>
        </div>

        <div class="dial-control">
            <input type="range" min="0" max="100" value="0" id="perilla">
            <div class="frecuencia"><span id="mhz">88.0</span> MHz</div>
        </div>
    </div>

    <!-- AQUÍ INDICAMOS LOS AUDIOS (Asegúrate que el nombre coincida con lo que subiste) -->
    <audio id="snd-estatica" loop src="estatica.mp3"></audio>
    <audio id="snd-cambio" src="sintonia.mp3"></audio>
    <audio id="snd-final" src="audio-final.mp3"></audio>

    <!-- Esto activa la lógica del radio -->
    <script src="script.js"></script>
</body>
</html>
